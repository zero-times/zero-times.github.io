<section class="disqus" data-disqus-shortname="{{site.disqus}}" data-disqus-save-data-guard="true">
    <div id="disqus_thread"></div>
    <script type="text/javascript">
        (function() {
            var disqus_shortname = '{{site.disqus}}';
            if (!disqus_shortname) {
                return;
            }

            var target = document.querySelector('.disqus');
            if (!target) {
                return;
            }
            target.setAttribute('data-disqus-state', 'idle');
            target.setAttribute('aria-live', 'polite');

            var loaded = false;
            var loading = false;
            function setDisqusState(state) {
                target.setAttribute('data-disqus-state', state);
            }
            function loadDisqus() {
                if (loaded || loading) {
                    return;
                }
                loading = true;
                setDisqusState('loading');
                var dsq = document.createElement('script');
                dsq.type = 'text/javascript';
                dsq.async = true;
                dsq.defer = true;
                dsq.fetchPriority = 'low';
                dsq.referrerPolicy = 'strict-origin-when-cross-origin';
                dsq.src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
                dsq.onload = function() {
                    loaded = true;
                    loading = false;
                    setDisqusState('loaded');
                };
                dsq.onerror = function() {
                    loaded = false;
                    loading = false;
                    setDisqusState('error');
                    appendLoadButton('Recarregar comentarios');
                };
                (document.head || document.body).appendChild(dsq);
            }

            function shouldDeferForDataSaving() {
                var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                var lowBandwidth = !!(
                    connection &&
                    typeof connection.downlink === 'number' &&
                    connection.downlink > 0 &&
                    connection.downlink <= 1.25
                );
                var lowMemoryDevice = typeof navigator.deviceMemory === 'number' && navigator.deviceMemory > 0 && navigator.deviceMemory <= 2;
                if (connection && connection.saveData) {
                    return true;
                }
                if (connection && (
                    connection.effectiveType === 'slow-2g' ||
                    connection.effectiveType === '2g' ||
                    connection.effectiveType === '3g' ||
                    lowBandwidth
                )) {
                    return true;
                }
                if (lowMemoryDevice) {
                    return true;
                }
                if (window.matchMedia) {
                    try {
                        return window.matchMedia('(prefers-reduced-data: reduce)').matches;
                    } catch (err) {
                        return false;
                    }
                }
                return false;
            }

            function appendLoadButton(label) {
                if (!target || target.querySelector('[data-disqus-load-button]')) {
                    return;
                }
                var loadWrap = document.createElement('div');
                loadWrap.className = 'disqus-load mt-3';
                var button = document.createElement('button');
                button.type = 'button';
                button.className = 'btn btn-sm btn-outline-secondary';
                button.setAttribute('data-disqus-load-button', 'true');
                button.setAttribute('aria-controls', 'disqus_thread');
                button.setAttribute('aria-label', 'Carregar comentarios com Disqus');
                button.textContent = label || 'Carregar comentarios';
                button.addEventListener('click', function() {
                    loadWrap.remove();
                    loadDisqus();
                }, { once: true });
                loadWrap.appendChild(button);
                target.appendChild(loadWrap);
            }

            if (shouldDeferForDataSaving()) {
                setDisqusState('deferred');
                appendLoadButton();
                return;
            }

            if ('IntersectionObserver' in window) {
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            observer.disconnect();
                            loadDisqus();
                        }
                    });
                }, { rootMargin: '200px 0px' });
                observer.observe(target);
            } else {
                loadDisqus();
            }
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow noopener noreferrer external">comments powered by Disqus.</a></noscript>
    <a href="https://disqus.com" class="dsq-brlink" rel="nofollow noopener noreferrer external">comments powered by <span class="logo-disqus">Disqus</span></a>
</section>
