<div class="newsletter">
  <p>Inscreva-se para receber atualizações sobre novos artigos.</p>
  <form class="newsletter-form" action="https://formspree.io/f/xvoewlbz" method="POST" aria-label="Assinar newsletter" aria-describedby="newsletter-hint">
    <input type="text" name="_gotcha" class="d-none" tabindex="-1" autocomplete="off" aria-hidden="true">
    <input type="hidden" name="source" value="newsletter">
    <div class="mb-3">
      <label class="visually-hidden" for="newsletter-email">Seu melhor email</label>
      <input id="newsletter-email" type="email" name="email" class="form-control" placeholder="Seu melhor email" aria-label="Seu melhor email" aria-describedby="newsletter-hint" autocomplete="email" inputmode="email" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="send" required>
      <small id="newsletter-hint" class="newsletter-hint">Sem spam. Cancelamento a qualquer momento.</small>
    </div>
    <button type="submit" class="btn btn-primary w-100">Inscrever-se</button>
  </form>
</div>
<script>
  (function () {
    var form = document.querySelector('.newsletter-form');
    if (!form || !document.head || form.dataset.formspreeWarmupBound === 'true') {
      return;
    }
    form.dataset.formspreeWarmupBound = 'true';

    var warmed = false;
    var warmup = function () {
      if (warmed) {
        return;
      }
      warmed = true;
      var link = document.createElement('link');
      link.rel = 'preconnect';
      link.href = 'https://formspree.io';
      link.crossOrigin = 'anonymous';
      document.head.appendChild(link);
      form.removeEventListener('focusin', warmup);
      form.removeEventListener('pointerdown', warmup);
      form.removeEventListener('touchstart', warmup);
    };

    form.addEventListener('focusin', warmup, { passive: true });
    form.addEventListener('pointerdown', warmup, { passive: true });
    form.addEventListener('touchstart', warmup, { passive: true });
  })();
</script>
