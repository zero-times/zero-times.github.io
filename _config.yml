# Site settings
title: "王雄皓 (Hoa)"
tagline: "产品型开发者｜Flutter、Node.js 与微信生态产品交付"
tagline_en: "Product-minded developer shipping Flutter, Node.js and WeChat products"
email: x5brain@gmail.com
description: "王雄皓 (Hoa) 的开发者作品站，展示 Flutter 跨端应用、Node.js 服务端、微信生态工具与产品从需求到上线的完整交付。"
keywords: "王雄皓 (Hoa), 产品型开发者, Flutter, Node.js, 微信小程序, 产品开发, 移动开发"
baseurl: ""
url: "https://youllbe.cn"
default_lang: "zh-CN"
locale: "zh_CN"
og_locale_alternate: "en_US"
author:
  name: "王雄皓 (Hoa)"
  display_name: "王雄皓 (Hoa)"
  bio: "把产品判断、跨端开发与上线交付放在同一条工作流里的产品型开发者"
  avatar: /assets/images/sal-300.jpg
  url: "https://youllbe.cn"
logo: /assets/images/logo.png
image: /assets/images/screenshot.jpg
image_alt: "王雄皓 (Hoa) Build Ledger 开发者作品站预览"
social_image_width: 1280
social_image_height: 720
theme_color_light: "#f4f1e8"
theme_color_dark: "#0d1210"

# Build settings
markdown: kramdown
timezone: Asia/Shanghai
collections:
  projects:
    output: true
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives

# Language settings
lang: "zh-CN"

# Pagination
paginate: 30
paginate_path: "/blog/page:num/"

# SEO / social
github_username: zero-times
whatsapp: "+8619152250086"
disqus: "youllbe-cn"
social:
  name: "王雄皓 (Hoa)"
  links:
    - https://github.com/zero-times
    - https://www.linkedin.com/in/hoa-wang/
    - https://wa.me/8619152250086

# Frontend
bootstrap_version: 5
google_analytics: "G-D37T5M8PL8"

# Build exclusions
exclude:
  - reports
  - test-responsive.html
  - AGENTS.md
  - README.md
  - SEO_FINAL_CLEANUP.md
  - STYLE_UPGRADE_SUMMARY.md
  - style-improvements.md
  - temp_codex_prompt.txt
  - create_brazil_news_post.py
  - debug_audit.py
  - scripts
  - Gemfile
  - Gemfile.lock
  - main.js
  - site.locale
  - site.og_locale_alternate
  - assets/css/custom.css
  - assets/css/custom.css.backup
  - assets/css/brazilian-theme.scss
  - assets/css/i18n.css
  - assets/css/responsive-enhancements.css
  - assets/css/theme.scss.backup
  - assets/js/i18n.js

# Defaults
defaults:
  - scope:
      path: "en"
    values:
      locale: "en_US"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
      dns_prefetch_disqus: true
      robots: "noindex,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
      sitemap: false
      load_analytics: false
      archive_content: true
      comments: false
      feed: false
  - scope:
      path: "_blogs"
    values:
      layout: "post"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
      dns_prefetch_disqus: true
      robots: "noindex,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
      sitemap: false
      load_analytics: false
      archive_content: true
      comments: false
      feed: false
