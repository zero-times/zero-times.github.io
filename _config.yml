# Site settings
title: "王雄皓 (Hoa)"
tagline: "Flutter、Node.js 与中小型产品开发落地"
email: x5brain@gmail.com
description: "王雄皓 (Hoa) 的个人作品站，聚焦 Flutter、Node.js 与中小型产品开发落地。"
keywords: "王雄皓 (Hoa), Flutter, Node.js, 个人作品集, 产品开发, 移动开发"
baseurl: ""
url: "https://youllbe.cn"
default_lang: "zh-CN"
locale: "zh_CN"
og_locale_alternate: "en_US"
author:
  name: "王雄皓 (Hoa)"
  display_name: "王雄皓 (Hoa)"
  bio: "Flutter、Node.js 与中小型产品开发实践者"
  avatar: /assets/images/sal-300.jpg
  url: "https://youllbe.cn"
logo: /assets/images/logo.png
image: /assets/images/screenshot.jpg
image_alt: "王雄皓 (Hoa) 个人作品站首页预览图"
social_image_width: 1280
social_image_height: 719
theme_color_light: "#14324a"
theme_color_dark: "#0b1320"

# Build settings
markdown: kramdown
theme: minima
timezone: Asia/Shanghai
collections:
  projects:
    output: true
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives

# Language settings
lang: "zh-CN"

# Pagination
paginate: 30
paginate_path: "/blog/page:num/"

# SEO / social
github_username: zero-times
whatsapp: "+8619152250086"
disqus: "youllbe-cn"
social:
  name: "王雄皓 (Hoa)"
  links:
    - https://github.com/zero-times
    - https://www.linkedin.com/in/hoa-wang/
    - https://wa.me/8619152250086

# Frontend
bootstrap_version: 5
google_analytics: "G-D37T5M8PL8"

# Build exclusions
exclude:
  - reports
  - test-responsive.html

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
      dns_prefetch_disqus: true
      robots: "noindex,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
      sitemap: false
      load_analytics: false
      archive_content: true
      comments: false
      feed: false
  - scope:
      path: "_blogs"
    values:
      layout: "post"
      lang: "zh-CN"
      preconnect_fonts: false
      load_webfonts: false
      dns_prefetch_disqus: true
      robots: "noindex,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
      sitemap: false
      load_analytics: false
      archive_content: true
      comments: false
      feed: false
