name: Site Audit

on:
  push:
    branches:
      - main
    paths:
      - "_config.yml"
      - "_layouts/**"
      - "_includes/**"
      - "_posts/**"
      - "_blogs/**"
      - "pages/**"
      - "index.html"
      - "assets/css/**"
      - "assets/js/**"
      - "_data/**"
      - "robots.txt"
      - "site.webmanifest"
      - "scripts/site_audit_tool.py"
  pull_request:
    paths:
      - "_config.yml"
      - "_layouts/**"
      - "_includes/**"
      - "_posts/**"
      - "_blogs/**"
      - "pages/**"
      - "index.html"
      - "assets/css/**"
      - "assets/js/**"
      - "_data/**"
      - "robots.txt"
      - "site.webmanifest"
      - "scripts/site_audit_tool.py"
  schedule:
    - cron: "50 2 * * *"
    - cron: "20 2 * * 1"
    - cron: "35 2 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run strict site audit (content changes)
        if: github.event_name != 'schedule'
        run: python3 scripts/site_audit_tool.py --strict

      - name: Run non-blocking external URL sample (push/PR)
        if: github.event_name != 'schedule'
        continue-on-error: true
        run: python3 scripts/site_audit_tool.py --http-check --http-sample 8 --http-timeout 3.5

      - name: Run non-blocking external URL sample (weekly scheduled)
        if: github.event_name == 'schedule' && github.event.schedule == '20 2 * * 1'
        continue-on-error: true
        run: python3 scripts/site_audit_tool.py --http-check --http-sample 40 --http-timeout 4.0

      - name: Run non-blocking external URL sample (daily scheduled)
        if: github.event_name == 'schedule' && github.event.schedule == '50 2 * * *'
        continue-on-error: true
        run: python3 scripts/site_audit_tool.py --http-check --http-sample 16 --http-timeout 3.5

      - name: Run strict site audit with deep external sample (monthly scheduled)
        if: github.event_name == 'schedule' && github.event.schedule == '35 2 1 * *'
        run: python3 scripts/site_audit_tool.py --strict --http-check --http-sample 50 --http-timeout 4.0

      - name: Summarize monthly external URL sample failures (non-blocking)
        if: github.event_name == 'schedule' && github.event.schedule == '35 2 1 * *' && always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import glob
          import json
          from collections import Counter
          from pathlib import Path
          from urllib.parse import urlparse

          report_paths = sorted(glob.glob('reports/site_audit_*.json'))
          summary_path = Path('reports/http_failures_summary.md')
          if not report_paths:
            summary_path.write_text('# HTTP Failure Summary\n\nNo audit report file found.\n', encoding='utf-8')
            raise SystemExit(0)

          report_path = Path(report_paths[-1])
          report = json.loads(report_path.read_text(encoding='utf-8'))
          http_check = report.get('sections', {}).get('broken_links_check', {}).get('http_check', {})
          sample_size = int(http_check.get('sample_size') or 0)
          failures = list(http_check.get('failures') or [])
          top = list(http_check.get('top_failing_domains') or [])

          if not top and failures:
            domain_counter = Counter()
            for row in failures:
              domain = urlparse((row.get('url') or '')).netloc.lower()
              if domain:
                domain_counter[domain] += 1
            top = [{'domain': d, 'count': c} for d, c in domain_counter.most_common(10)]

          lines = [
            '# HTTP Failure Summary',
            '',
            f'- Report: `{report_path.as_posix()}`',
            f'- Sampled URLs: {sample_size}',
            f'- Failed URLs: {len(failures)}',
            '',
          ]

          if top:
            lines.extend(['## Top failing domains', '', '| Domain | Failures |', '| --- | ---: |'])
            for item in top:
              lines.append(f"| {item.get('domain', '-')} | {item.get('count', 0)} |")
          else:
            lines.append('No failing domains detected in this sample.')

          summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(summary_path.read_text(encoding='utf-8'))
          PY

      - name: Upload site audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports-${{ github.run_id }}
          path: reports/site_audit_*.json
          if-no-files-found: ignore
          retention-days: 21

      - name: Upload monthly HTTP failure summary
        if: github.event_name == 'schedule' && github.event.schedule == '35 2 1 * *' && always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-http-summary-${{ github.run_id }}
          path: reports/http_failures_summary.md
          if-no-files-found: ignore
          retention-days: 60

      - name: Build site for rendered SEO smoke check
        run: bundle exec jekyll build

      - name: Assert rendered canonical/noindex signals on paginated archive
        run: |
          PAGE2="_site/blog/page2/index.html"
          if [ ! -f "$PAGE2" ]; then
            echo "SKIP: $PAGE2 not generated (insufficient posts for page 2)."
            exit 0
          fi
          grep -q '<meta name="robots" content="noindex,follow' "$PAGE2"
          grep -q '<meta name="googlebot" content="noindex,follow' "$PAGE2"
          grep -q 'rel="canonical"' "$PAGE2"
          CANONICAL_COUNT=$(grep -o 'rel="canonical"' "$PAGE2" | wc -l | tr -d ' ')
          if [ "$CANONICAL_COUNT" -ne 1 ]; then
            echo "Expected exactly 1 canonical tag on page 2, found $CANONICAL_COUNT"
            exit 1
          fi

      - name: Assert rendered canonical singularity on homepage/share
        run: |
          HOME="_site/index.html"
          SHARE="_site/share/index.html"
          if [ ! -f "$HOME" ]; then
            echo "Missing rendered homepage: $HOME"
            exit 1
          fi
          if [ ! -f "$SHARE" ]; then
            echo "Missing rendered share page: $SHARE"
            exit 1
          fi
          HOME_CANONICAL_COUNT=$(grep -o 'rel="canonical"' "$HOME" | wc -l | tr -d ' ')
          SHARE_CANONICAL_COUNT=$(grep -o 'rel="canonical"' "$SHARE" | wc -l | tr -d ' ')
          if [ "$HOME_CANONICAL_COUNT" -ne 1 ]; then
            echo "Expected exactly 1 canonical tag on homepage, found $HOME_CANONICAL_COUNT"
            exit 1
          fi
          if [ "$SHARE_CANONICAL_COUNT" -ne 1 ]; then
            echo "Expected exactly 1 canonical tag on share page, found $SHARE_CANONICAL_COUNT"
            exit 1
          fi

      - name: Assert paginated archive omits hreflang alternates
        run: |
          PAGE2="_site/blog/page2/index.html"
          if [ ! -f "$PAGE2" ]; then
            echo "SKIP: $PAGE2 not generated (insufficient posts for page 2)."
            exit 0
          fi
          if grep -q 'rel="alternate" hreflang=' "$PAGE2"; then
            echo "Expected no hreflang alternate links on paginated archive page 2"
            exit 1
          fi

      - name: Assert rendered apple touch icon policy
        run: |
          HOME="_site/index.html"
          if [ ! -f "$HOME" ]; then
            echo "Missing rendered homepage: $HOME"
            exit 1
          fi
          grep -Eq '<link rel="apple-touch-icon"[^>]*sizes="180x180"[^>]*href="[^"]*assets/images/apple-touch-icon.png"' "$HOME"

      - name: Assert rendered social image alt fallback on share page
        run: |
          SHARE="_site/share/index.html"
          if [ ! -f "$SHARE" ]; then
            echo "Missing rendered share page: $SHARE"
            exit 1
          fi
          grep -q '<meta property="og:image:alt" content=' "$SHARE"
          grep -q '<meta name="twitter:image:alt" content=' "$SHARE"

      - name: Assert noindex utility pages omit analytics payload
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            if grep -q 'googletagmanager.com/gtag/js' "$page"; then
              echo "Unexpected GA loader on noindex utility page: $page"
              exit 1
            fi
            if grep -q "gtag('config'" "$page"; then
              echo "Unexpected GA config snippet on noindex utility page: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages include robots noindex,follow
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            grep -q '<meta name="robots" content="noindex,follow">' "$page" || {
              echo "Missing robots noindex,follow tag on utility page: $page"
              exit 1
            }
          done

      - name: Assert noindex utility pages keep single canonical tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            CANONICAL_COUNT=$(grep -o 'rel="canonical"' "$page" | wc -l | tr -d ' ')
            if [ "$CANONICAL_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 canonical tag on utility page, found $CANONICAL_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single meta description tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            DESCRIPTION_COUNT=$(grep -o '<meta name="description"' "$page" | wc -l | tr -d ' ')
            if [ "$DESCRIPTION_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 meta description tag on utility page, found $DESCRIPTION_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single og:description tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            OG_DESCRIPTION_COUNT=$(grep -o '<meta property="og:description"' "$page" | wc -l | tr -d ' ')
            if [ "$OG_DESCRIPTION_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 og:description tag on utility page, found $OG_DESCRIPTION_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single og:title tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            OG_TITLE_COUNT=$(grep -o '<meta property="og:title"' "$page" | wc -l | tr -d ' ')
            if [ "$OG_TITLE_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 og:title tag on utility page, found $OG_TITLE_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single og:type tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            OG_TYPE_COUNT=$(grep -o '<meta property="og:type"' "$page" | wc -l | tr -d ' ')
            if [ "$OG_TYPE_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 og:type tag on utility page, found $OG_TYPE_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single og:locale tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            OG_LOCALE_COUNT=$(grep -o '<meta property="og:locale"' "$page" | wc -l | tr -d ' ')
            if [ "$OG_LOCALE_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 og:locale tag on utility page, found $OG_LOCALE_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single twitter:description tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            TWITTER_DESCRIPTION_COUNT=$(grep -o '<meta name="twitter:description"' "$page" | wc -l | tr -d ' ')
            if [ "$TWITTER_DESCRIPTION_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 twitter:description tag on utility page, found $TWITTER_DESCRIPTION_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single twitter:title tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            TWITTER_TITLE_COUNT=$(grep -o '<meta name="twitter:title"' "$page" | wc -l | tr -d ' ')
            if [ "$TWITTER_TITLE_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 twitter:title tag on utility page, found $TWITTER_TITLE_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert noindex utility pages keep single twitter:card tag
        run: |
          PAGES=(
            "_site/404.html"
            "_site/categories/index.html"
            "_site/tags/index.html"
            "_site/share/index.html"
            "_site/privacy-policy/index.html"
            "_site/terms/index.html"
          )
          for page in "${PAGES[@]}"; do
            if [ ! -f "$page" ]; then
              echo "Missing rendered page: $page"
              exit 1
            fi
            TWITTER_CARD_COUNT=$(grep -o '<meta name="twitter:card"' "$page" | wc -l | tr -d ' ')
            if [ "$TWITTER_CARD_COUNT" -ne 1 ]; then
              echo "Expected exactly 1 twitter:card tag on utility page, found $TWITTER_CARD_COUNT: $page"
              exit 1
            fi
          done

      - name: Assert rendered mobile landmarks, touch icon, and web app meta policy
        run: |
          HOME="_site/index.html"
          SHARE="_site/share/index.html"
          if [ ! -f "$HOME" ]; then
            echo "Missing rendered homepage: $HOME"
            exit 1
          fi
          if [ ! -f "$SHARE" ]; then
            echo "Missing rendered share page: $SHARE"
            exit 1
          fi
          grep -q '<main class="flex-grow-1" id="main-content" role="main" tabindex="-1" aria-label="Conteúdo principal">' "$HOME"
          grep -q '<main id="main-content" role="main" tabindex="-1" aria-label="Conteúdo principal">' "$SHARE"
          grep -Eq '<link rel="apple-touch-icon"[^>]*sizes="180x180"[^>]*href="[^"]*assets/images/apple-touch-icon.png"' "$SHARE"
          grep -q '<meta name="mobile-web-app-capable" content="yes">' "$HOME"
          grep -q '<meta name="apple-mobile-web-app-capable" content="yes">' "$HOME"
          grep -q '<meta name="apple-mobile-web-app-status-bar-style" content="default">' "$HOME"
          grep -q '<meta name="apple-mobile-web-app-title" content=' "$HOME"
          grep -q '<meta name="application-name" content=' "$HOME"
          grep -q '<meta name="theme-color" content="#2c3e50">' "$HOME"
          grep -q '<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1320">' "$HOME"
          grep -q '<meta name="mobile-web-app-capable" content="yes">' "$SHARE"
          grep -q '<meta name="apple-mobile-web-app-capable" content="yes">' "$SHARE"
          grep -q '<meta name="apple-mobile-web-app-status-bar-style" content="default">' "$SHARE"
          grep -q '<meta name="apple-mobile-web-app-title" content=' "$SHARE"
          grep -q '<meta name="application-name" content=' "$SHARE"
          grep -q '<meta name="theme-color" content="#2c3e50">' "$SHARE"
          grep -q '<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1320">' "$SHARE"

      - name: Assert rendered mobile drawer accessibility invariants
        run: |
          HOME="_site/index.html"
          if [ ! -f "$HOME" ]; then
            echo "Missing rendered homepage: $HOME"
            exit 1
          fi
          grep -Eq 'id="mobileMenuButton"[^>]*aria-controls="siteMobileDrawer"' "$HOME"
          grep -Eq 'id="mobileMenuButton"[^>]*aria-haspopup="dialog"' "$HOME"
          grep -Eq 'id="mobileMenuButton"[^>]*aria-expanded="false"' "$HOME"
          grep -Eq 'id="siteMobileDrawer"[^>]*role="dialog"' "$HOME"
          grep -Eq 'id="siteMobileDrawer"[^>]*aria-modal="true"' "$HOME"
          grep -Eq 'id="siteMobileDrawer"[^>]*aria-describedby="siteMobileDrawerHint"' "$HOME"
          grep -Eq 'id="siteMobileDrawerHint"' "$HOME"

      - name: Assert rendered manifest link policy
        run: |
          HOME="_site/index.html"
          SHARE="_site/share/index.html"
          if [ ! -f "$HOME" ]; then
            echo "Missing rendered homepage: $HOME"
            exit 1
          fi
          if [ ! -f "$SHARE" ]; then
            echo "Missing rendered share page: $SHARE"
            exit 1
          fi
          grep -Eq '<link rel="manifest" href="[^"]*/site\.webmanifest"' "$HOME"
          grep -Eq '<link rel="manifest" href="[^"]*/site\.webmanifest"' "$SHARE"

      - name: Upload site audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-report-${{ github.run_id }}
          path: reports/site_audit_*.json
          if-no-files-found: warn

      - name: Upload monthly HTTP failure summary
        if: github.event_name == 'schedule' && github.event.schedule == '35 2 1 * *' && always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-http-failure-summary-${{ github.run_id }}
          path: reports/http_failures_summary.md
          if-no-files-found: warn
