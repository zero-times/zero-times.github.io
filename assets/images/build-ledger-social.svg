<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Hoa Build Ledger developer portfolio</title>
  <desc id="desc">Editorial developer portfolio cover in warm paper, ink black and signal orange.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#111814" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#111814" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#f4f1e8"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect x="0" y="0" width="1280" height="10" fill="#e94f2f"/>

  <g transform="translate(72 62)">
    <rect width="54" height="54" fill="#e94f2f" stroke="#111814" stroke-width="3"/>
    <text x="27" y="34" text-anchor="middle" fill="#fffaf2" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700">H/</text>
    <text x="72" y="22" fill="#111814" font-family="Iowan Old Style, Georgia, serif" font-size="24" font-weight="700">王雄皓 · HOA</text>
    <text x="72" y="46" fill="#5e6861" font-family="Menlo, Consolas, monospace" font-size="13" letter-spacing="2">BUILD LEDGER / PRODUCT ENGINEERING</text>
  </g>

  <g transform="translate(72 180)">
    <text fill="#e94f2f" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" letter-spacing="2">// PRODUCT-MINDED DEVELOPER</text>
    <text y="92" fill="#111814" font-family="Iowan Old Style, Georgia, serif" font-size="82" font-weight="700" letter-spacing="-3">BUILD.</text>
    <text y="174" fill="#111814" font-family="Iowan Old Style, Georgia, serif" font-size="82" font-weight="700" letter-spacing="-3">SHIP.</text>
    <text y="256" fill="#111814" font-family="Iowan Old Style, Georgia, serif" font-size="82" font-weight="700" letter-spacing="-3">ITERATE.</text>
    <rect x="0" y="291" width="650" height="2" fill="#8d958e"/>
    <text y="332" fill="#29332d" font-family="Avenir Next, Helvetica, sans-serif" font-size="23">From unclear requirements to products that can launch and evolve.</text>

    <g transform="translate(0 370)" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">
      <rect width="122" height="38" fill="#111814"/>
      <text x="61" y="25" text-anchor="middle" fill="#d8f76c">FLUTTER</text>
      <rect x="132" width="122" height="38" fill="#fffdf7" stroke="#111814" stroke-width="2"/>
      <text x="193" y="25" text-anchor="middle" fill="#111814">NODE.JS</text>
      <rect x="264" width="150" height="38" fill="#fffdf7" stroke="#111814" stroke-width="2"/>
      <text x="339" y="25" text-anchor="middle" fill="#111814">WECHAT TOOLS</text>
      <rect x="424" width="130" height="38" fill="#fffdf7" stroke="#111814" stroke-width="2"/>
      <text x="489" y="25" text-anchor="middle" fill="#111814">AUTOMATION</text>
    </g>
  </g>

  <g transform="translate(840 84)" filter="url(#shadow)">
    <rect width="368" height="552" fill="#18201b" stroke="#111814" stroke-width="3"/>
    <rect width="368" height="46" fill="#232d27"/>
    <circle cx="24" cy="23" r="5" fill="#e94f2f"/>
    <circle cx="44" cy="23" r="5" fill="#d8f76c"/>
    <circle cx="64" cy="23" r="5" fill="#8d958e"/>
    <text x="344" y="29" text-anchor="end" fill="#a6b0a8" font-family="Menlo, Consolas, monospace" font-size="11">hoa.build</text>

    <g transform="translate(28 82)" font-family="Menlo, Consolas, monospace">
      <text fill="#d8f76c" font-size="13">$ open current_focus</text>
      <text y="40" fill="#f0f2e9" font-size="19" font-weight="700">CASE FILES</text>
      <rect y="58" width="312" height="1" fill="#3d4941"/>

      <g transform="translate(0 88)">
        <text fill="#ff7658" font-size="13">01</text>
        <text x="42" fill="#f0f2e9" font-size="15">Youdian Banfa</text>
        <text x="42" y="24" fill="#a6b0a8" font-size="11">content → Mini Program → data</text>
      </g>
      <g transform="translate(0 158)">
        <text fill="#ff7658" font-size="13">02</text>
        <text x="42" fill="#f0f2e9" font-size="15">AppShots</text>
        <text x="42" y="24" fill="#a6b0a8" font-size="11">assets → structure → release</text>
      </g>
      <g transform="translate(0 228)">
        <text fill="#ff7658" font-size="13">03</text>
        <text x="42" fill="#f0f2e9" font-size="15">Privacy-first product</text>
        <text x="42" y="24" fill="#a6b0a8" font-size="11">restraint → local data → trust</text>
      </g>
      <g transform="translate(0 298)">
        <text fill="#ff7658" font-size="13">04</text>
        <text x="42" fill="#f0f2e9" font-size="15">Product delivery</text>
        <text x="42" y="24" fill="#a6b0a8" font-size="11">scope → build → ship</text>
      </g>

      <rect y="372" width="312" height="1" fill="#3d4941"/>
      <text y="408" fill="#d8f76c" font-size="12">status: building in public</text>
      <text y="438" fill="#a6b0a8" font-size="11">youllbe.cn</text>
    </g>
  </g>

  <text x="72" y="682" fill="#5e6861" font-family="Menlo, Consolas, monospace" font-size="12" letter-spacing="1">PORTFOLIO / CASE STUDIES / DELIVERY NOTES</text>
  <text x="1208" y="682" text-anchor="end" fill="#e94f2f" font-family="Menlo, Consolas, monospace" font-size="12" font-weight="700">2026.07</text>
</svg>
